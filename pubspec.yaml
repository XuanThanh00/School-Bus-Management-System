publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.1.0
  intl: ^0.18.1
  flutter_svg: ^2.0.9
  firebase_core: ^4.6.0
  firebase_auth: ^6.3.0
  firebase_database: ^12.2.0
  cloud_firestore: ^6.2.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^18.0.1
  shared_preferences: ^2.3.2
  google_maps_flutter: ^2.17.0
  flutter_map: ^8.2.2
  latlong2: ^0.9.1
  characters: ^1.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
